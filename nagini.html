<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Nagini's Run</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-family: 'Georgia', serif; color: #e8d5a3;
    padding: 20px;
    background-color: #16161a;
    background-image: url('');
    background-size: cover;
  }

  h1 { font-size: 1.6rem; margin-bottom: 8px; color: #f5c542; letter-spacing: 3px; text-shadow: 0 0 18px #f5c54288, 0 0 40px #f5c54244; }
  #info { display: flex; gap: 36px; margin-bottom: 10px; font-size: 0.95rem; color: #c8b87a; }
  #info span { color: #f5c542; font-weight: bold; }

  #main { display: flex; gap: 24px; align-items: flex-start; }
  #game-col { display: flex; flex-direction: column; align-items: center; }

  canvas { border: 2px solid #4a3a1a; border-radius: 4px; display: block; box-shadow: 0 0 30px #00000088; }
  #shrink-bar-wrap { width: 384px; background: #111; border-radius: 4px; height: 8px; margin-bottom: 8px; border: 1px solid #3a5a1a; }
  #shrink-bar { height: 100%; background: linear-gradient(90deg, #2a8a1a, #5dde3a); border-radius: 4px; width: 100%; box-shadow: 0 0 8px #3dff0066; }
  #shrink-label { font-size: 0.72rem; color: #6a8a5a; margin-bottom: 4px; }
  #msg { margin-top: 10px; font-size: 0.9rem; color: #8a7a5a; min-height: 20px; font-style: italic; }
  #startBtn {
    margin-top: 12px; padding: 10px 32px;
    background: linear-gradient(135deg, #1a4a0a, #2a7a1a);
    color: #a0ff60; border: 1px solid #3dff0077; border-radius: 6px;
    font-size: 1rem; font-weight: bold; cursor: pointer;
    letter-spacing: 1px; font-family: Georgia, serif;
    box-shadow: 0 0 14px #3dff0033;
    transition: box-shadow 0.2s;
  }
  #startBtn:hover { box-shadow: 0 0 24px #3dff0077; }

  #name-entry {
    display: none; flex-direction: column; align-items: center; gap: 8px; margin-top: 10px;
  }
  #name-entry label { font-size: 0.85rem; color: #c8b87a; }
  #name-input {
    background: #111; border: 1px solid #f5c542; border-radius: 4px;
    color: #f5c542; font-family: Georgia, serif; font-size: 1rem;
    padding: 6px 10px; width: 160px; text-align: center; outline: none;
  }
  #name-input:focus { box-shadow: 0 0 8px #f5c54266; }
  #save-btn {
    padding: 6px 20px;
    background: linear-gradient(135deg, #c8960a, #f5c542);
    color: #1a0a00; border: none; border-radius: 4px;
    font-family: Georgia, serif; font-size: 0.9rem; cursor: pointer; font-weight: bold;
  }

  #leaderboard {
    background: rgba(10,12,8,0.82);
    border: 1px solid #3a4a2a; border-radius: 8px;
    padding: 14px 16px; min-width: 180px;
    box-shadow: 0 0 20px #00000066;
    backdrop-filter: blur(2px);
  }
  #leaderboard h2 {
    color: #f5c542; font-size: 1rem; text-align: center;
    margin-bottom: 10px; letter-spacing: 2px;
    text-shadow: 0 0 10px #f5c54266;
    border-bottom: 1px solid #3a4a2a; padding-bottom: 6px;
  }
  #lb-list { list-style: none; }
  #lb-list li {
    display: flex; justify-content: space-between; align-items: center;
    padding: 5px 2px; font-size: 0.82rem; border-bottom: 1px solid #1a2a1a;
  }
  #lb-list li:last-child { border-bottom: none; }
  .lb-rank { color: #6a8a5a; width: 20px; }
  .lb-rank.gold { color: #f5c542; text-shadow: 0 0 8px #f5c54288; }
  .lb-rank.silver { color: #c0c0c0; }
  .lb-rank.bronze { color: #cd7f32; }
  .lb-name { flex: 1; padding: 0 6px; color: #e8d5a3; }
  .lb-score { color: #5dde3a; font-weight: bold; text-shadow: 0 0 6px #3dff0066; }
  .lb-empty { color: #3a5a3a; font-size: 0.78rem; text-align: center; padding: 10px 0; }
  #lb-loading { color: #3a5a3a; font-size: 0.78rem; text-align: center; padding: 10px 0; }
</style>
</head>
<body>
<h1>🐍 NAGINI'S RUN 🐍</h1>
<div id="info">
  <div>Skóre: <span id="score">0</span></div>
  <div>Délka: <span id="length">1</span></div>
  <div>Rychlost: <span id="speed">1</span></div>
</div>

<div id="main">
  <div id="game-col">
    <div id="shrink-label">Zkrácení za: <span id="shrink-countdown">10</span>s</div>
    <div id="shrink-bar-wrap"><div id="shrink-bar"></div></div>
    <canvas id="c" width="384" height="384"></canvas>
    <button id="startBtn">⚡ START</button>
    <div id="name-entry">
      <label>Tvoje jméno (max 10 znaků):</label>
      <input id="name-input" type="text" maxlength="10" placeholder="Hráč" />
      <button id="save-btn">⚡ Uložit skóre</button>
    </div>
    <div id="msg">Ovládání: šipky na klávesnici</div>
  </div>

  <div id="leaderboard">
    <h2>🏆 KOMNATA SLÁVY</h2>
    <div id="lb-loading">Načítám...</div>
    <ul id="lb-list"></ul>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const CELL = 32, COLS = 12, ROWS = 12;
const scoreEl = document.getElementById('score');
const lengthEl = document.getElementById('length');
const speedEl = document.getElementById('speed');
const shrinkBar = document.getElementById('shrink-bar');
const shrinkCountdown = document.getElementById('shrink-countdown');
const startBtn = document.getElementById('startBtn');
const nameEntry = document.getElementById('name-entry');
const nameInput = document.getElementById('name-input');
const saveBtn = document.getElementById('save-btn');
const lbList = document.getElementById('lb-list');
const lbLoading = document.getElementById('lb-loading');
const SHRINK_INTERVAL = 10000;

let snake = [], snakePrev = [];
let dir = {x:1,y:0}, nextDir = {x:1,y:0};
let food = null;
let score = 0, running = false, gameOver = false;
let stepInterval = 200;
let lastStepTime = 0, shrinkElapsed = 0, lastTs = 0, rafId = null;
let interpT = 0, particles = [], nextFoodIsBonus = false;

// ── Leaderboard ────────────────────────────────────────────────────────────
async function loadLeaderboard() {
  lbLoading.style.display = 'block'; lbList.innerHTML = '';
  try {
    const res = await window.storage.list('lb:', true);
    const keys = (res && res.keys) ? res.keys : [];
    const entries = [];
    for (const key of keys) {
      try { const r = await window.storage.get(key, true); if (r && r.value) entries.push(JSON.parse(r.value)); } catch(e) {}
    }
    entries.sort((a,b) => b.score - a.score);
    const top = entries.slice(0,10);
    lbLoading.style.display = 'none';
    if (!top.length) { lbList.innerHTML = '<li><span class="lb-empty">Zatím žádné skóre</span></li>'; return; }
    lbList.innerHTML = '';
    top.forEach((e,i) => {
      const li = document.createElement('li');
      const rc = i===0?'gold':i===1?'silver':i===2?'bronze':'';
      const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}.`;
      li.innerHTML = `<span class="lb-rank ${rc}">${medal}</span><span class="lb-name">${e.name}</span><span class="lb-score">${e.score}</span>`;
      lbList.appendChild(li);
    });
  } catch(e) { lbLoading.textContent = 'Chyba: '+e.message; }
}

async function saveScore(name, sc) {
  try {
    const key = 'lb:'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
    await window.storage.set(key, JSON.stringify({name: name.trim()||'Hráč', score: sc}), true);
    await loadLeaderboard();
  } catch(e) {}
}

// ── Audio ──────────────────────────────────────────────────────────────────
let AC = null;
function getAC() {
  if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
  if (AC.state==='suspended') AC.resume();
  return AC;
}
function playTone(freq, type, gainVal, duration, startDelay) {
  try {
    const ac=getAC(), now=ac.currentTime+(startDelay||0);
    const o=ac.createOscillator(), g=ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type=type; o.frequency.value=freq;
    g.gain.setValueAtTime(gainVal,now);
    g.gain.exponentialRampToValueAtTime(0.001,now+duration);
    o.start(now); o.stop(now+duration);
  } catch(e) {}
}
function playEat(bonus) {
  if (bonus) {
    [[392,0],[523,0.12],[659,0.24],[784,0.36],[1046,0.52]].forEach(([f,d]) => playTone(f,'sawtooth',0.2,0.25,d));
  } else {
    playTone(500,'sine',0.15,0.15,0);
    playTone(700,'sine',0.12,0.12,0.06);
    playTone(900,'sine',0.10,0.10,0.12);
  }
}
function playShrink() { playTone(220,'sawtooth',0.12,0.5,0); }
function playDeath() {
  playTone(120,'sine',0.3,0.8,0);
  playTone(320,'sine',0.08,0.6,0.1);
  playTone(240,'sine',0.06,0.6,0.3);
}
function playStart() {
  [261,329,392,523,659].forEach((f,i) => playTone(f,'triangle',0.15,0.25,i*0.09));
}

// ── Helpers ────────────────────────────────────────────────────────────────
function lerp(a,b,t) { return a+(b-a)*t; }
function addParticles(gx,gy,color,count) {
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2, sp=1+Math.random()*2;
    particles.push({x:gx*CELL+CELL/2,y:gy*CELL+CELL/2,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,color,r:2+Math.random()*4});
  }
}
function placeFood() {
  let pos;
  do { pos={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)}; }
  while(snake.some(s=>s.x===pos.x&&s.y===pos.y));
  food=pos;
  nextFoodIsBonus=(score+1)%10===0;
}

// ── Stone texture offscreen canvas ─────────────────────────────────────────
// ── Seeded RNG for consistent stone pattern ────────────────────────────────
function makeRng(seed) {
  let s = seed;
  return () => { s = (s * 1664525 + 1013904223) & 0xffffffff; return (s >>> 0) / 0xffffffff; };
}

const stoneCanvas = document.createElement('canvas');
stoneCanvas.width = 800; stoneCanvas.height = 600;
const sctx = stoneCanvas.getContext('2d');

(function buildStone(){
  const W = stoneCanvas.width, H = stoneCanvas.height;
  const rng = makeRng(42);

  // ── 1. Base coat: dark cool grey ──────────────────────────────────────
  sctx.fillStyle = '#16161a';
  sctx.fillRect(0, 0, W, H);

  // ── 2. Define stone block layout ──────────────────────────────────────
  const BW = 110, BH = 52, MORTAR = 5;
  const blocks = [];
  for (let row = 0; row * BH < H + BH; row++) {
    const offset = row % 2 === 0 ? 0 : BW * 0.5;
    for (let col = -1; col * BW < W + BW; col++) {
      const x = col * BW - offset;
      const y = row * BH;
      // slight random size variation per block
      const wVar = (rng() - 0.5) * 14;
      const hVar = (rng() - 0.5) * 6;
      blocks.push({ x, y, w: BW + wVar, h: BH + hVar, rng: makeRng((row*100+col)*7+13) });
    }
  }

  // ── 3. Draw mortar (background between blocks) ────────────────────────
  const mortarGrad = sctx.createLinearGradient(0, 0, 0, H);
  mortarGrad.addColorStop(0, '#111215');
  mortarGrad.addColorStop(1, '#0d0e11');
  sctx.fillStyle = mortarGrad;
  sctx.fillRect(0, 0, W, H);

  // ── 4. Draw each stone block ──────────────────────────────────────────
  blocks.forEach(({ x, y, w, h, rng: r }) => {
    const m = MORTAR;
    const bx = x + m, by = y + m, bw = w - m * 2, bh = h - m * 2;
    if (bw < 4 || bh < 4) return;

    // Base stone color – cool dark grey with slight warm/cool variation
    const base = 28 + Math.floor(r() * 18);
    const warm = Math.floor(r() * 6) - 2;
    const cr = base + warm, cg = base, cb = base - warm + 2;

    // ── Gradient: top-left lighter (ambient light), bottom-right darker ──
    const stoneGrad = sctx.createLinearGradient(bx, by, bx + bw, by + bh);
    stoneGrad.addColorStop(0,   `rgb(${cr+14},${cg+12},${cb+10})`);
    stoneGrad.addColorStop(0.3, `rgb(${cr+6}, ${cg+5}, ${cb+4})`);
    stoneGrad.addColorStop(0.7, `rgb(${cr},   ${cg},   ${cb})`);
    stoneGrad.addColorStop(1,   `rgb(${cr-8}, ${cg-9}, ${cb-7})`);
    sctx.fillStyle = stoneGrad;
    sctx.beginPath();
    sctx.roundRect(bx, by, bw, bh, 1);
    sctx.fill();

    // ── Surface texture: random noise dots ────────────────────────────
    sctx.globalAlpha = 0.055;
    for (let i = 0; i < 60; i++) {
      const tx = bx + r() * bw, ty = by + r() * bh;
      const bright = r() > 0.5;
      sctx.fillStyle = bright ? '#ffffff' : '#000000';
      sctx.beginPath();
      sctx.arc(tx, ty, r() * 1.4, 0, Math.PI * 2);
      sctx.fill();
    }
    sctx.globalAlpha = 1;

    // ── Fine horizontal grain lines ───────────────────────────────────
    sctx.globalAlpha = 0.045;
    const lineCount = 3 + Math.floor(r() * 4);
    for (let i = 0; i < lineCount; i++) {
      const ly = by + r() * bh;
      sctx.strokeStyle = r() > 0.4 ? '#cccccc' : '#050505';
      sctx.lineWidth = 0.4 + r() * 0.5;
      sctx.beginPath();
      // slightly wavy grain
      sctx.moveTo(bx, ly);
      const mid = bx + bw * 0.5;
      sctx.quadraticCurveTo(mid, ly + (r()-0.5)*3, bx + bw, ly + (r()-0.5)*2);
      sctx.stroke();
    }
    sctx.globalAlpha = 1;

    // ── Vertical micro-cracks / veins ─────────────────────────────────
    if (r() < 0.3) {
      sctx.globalAlpha = 0.06;
      sctx.strokeStyle = '#000000';
      sctx.lineWidth = 0.6;
      sctx.beginPath();
      const cx = bx + bw * (0.2 + r() * 0.6);
      sctx.moveTo(cx, by + r() * bh * 0.3);
      sctx.lineTo(cx + (r()-0.5)*4, by + bh * (0.4 + r() * 0.4));
      sctx.stroke();
      sctx.globalAlpha = 1;
    }

    // ── Highlight: thin bright top edge (light catching stone lip) ────
    sctx.globalAlpha = 0.18;
    sctx.strokeStyle = `rgb(${cr+30},${cg+28},${cb+25})`;
    sctx.lineWidth = 0.8;
    sctx.beginPath();
    sctx.moveTo(bx + 2, by + 1);
    sctx.lineTo(bx + bw - 2, by + 1);
    sctx.stroke();

    // ── Shadow: thin dark bottom edge ────────────────────────────────
    sctx.strokeStyle = `rgb(${Math.max(0,cr-20)},${Math.max(0,cg-22)},${Math.max(0,cb-18)})`;
    sctx.lineWidth = 1;
    sctx.beginPath();
    sctx.moveTo(bx + 1, by + bh - 1);
    sctx.lineTo(bx + bw - 1, by + bh - 1);
    sctx.stroke();

    // ── Left shadow (depth in mortar) ────────────────────────────────
    sctx.globalAlpha = 0.22;
    const lsh = sctx.createLinearGradient(bx, by, bx + 6, by);
    lsh.addColorStop(0, 'rgba(0,0,0,0.7)');
    lsh.addColorStop(1, 'rgba(0,0,0,0)');
    sctx.fillStyle = lsh;
    sctx.fillRect(bx, by, 6, bh);

    // ── Bottom shadow ─────────────────────────────────────────────────
    const bsh = sctx.createLinearGradient(bx, by + bh - 6, bx, by + bh);
    bsh.addColorStop(0, 'rgba(0,0,0,0)');
    bsh.addColorStop(1, 'rgba(0,0,0,0.5)');
    sctx.fillStyle = bsh;
    sctx.fillRect(bx, by + bh - 6, bw, 6);
    sctx.globalAlpha = 1;
  });

  // ── 5. Moss / age stains in corners and along bottom ─────────────────
  const rng2 = makeRng(99);
  for (let i = 0; i < 18; i++) {
    const sx = rng2() * W, sy = rng2() * H;
    const sr = 20 + rng2() * 60;
    const mossGrad = sctx.createRadialGradient(sx, sy, 0, sx, sy, sr);
    mossGrad.addColorStop(0, `rgba(20,35,15,${0.08 + rng2()*0.1})`);
    mossGrad.addColorStop(1, 'rgba(0,0,0,0)');
    sctx.fillStyle = mossGrad;
    sctx.beginPath(); sctx.arc(sx, sy, sr, 0, Math.PI*2); sctx.fill();
  }

  // ── 6. Water stain streaks (damp castle) ─────────────────────────────
  const rng3 = makeRng(77);
  sctx.globalAlpha = 0.07;
  for (let i = 0; i < 8; i++) {
    const sx = rng3() * W;
    const stainGrad = sctx.createLinearGradient(sx, 0, sx + (rng3()-0.5)*30, H);
    stainGrad.addColorStop(0, 'rgba(30,40,60,0)');
    stainGrad.addColorStop(0.3, 'rgba(30,40,60,0.6)');
    stainGrad.addColorStop(1, 'rgba(30,40,60,0)');
    sctx.strokeStyle = stainGrad;
    sctx.lineWidth = 2 + rng3() * 4;
    sctx.beginPath();
    sctx.moveTo(sx, 0);
    sctx.bezierCurveTo(sx+(rng3()-0.5)*20, H*0.3, sx+(rng3()-0.5)*20, H*0.6, sx+(rng3()-0.5)*15, H);
    sctx.stroke();
  }
  sctx.globalAlpha = 1;

  // ── 7. Overall vignette + depth darkening ─────────────────────────────
  const vg = sctx.createRadialGradient(W*0.5, H*0.4, 60, W*0.5, H*0.5, Math.max(W,H)*0.75);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(0.6, 'rgba(0,0,0,0.15)');
  vg.addColorStop(1, 'rgba(0,0,0,0.55)');
  sctx.fillStyle = vg;
  sctx.fillRect(0, 0, W, H);
  // Apply stone texture to page background
  const bgUrl = stoneCanvas.toDataURL('image/jpeg', 0.92);
  document.body.style.backgroundImage = `url('${bgUrl}')`;
  document.body.style.backgroundSize = 'cover';
  document.body.style.backgroundPosition = 'center';
})();

// ── Init ───────────────────────────────────────────────────────────────────
function init() {
  if(rafId) cancelAnimationFrame(rafId); rafId=null;
  snake=[{x:6,y:6}]; snakePrev=[{x:6,y:6}];
  dir={x:1,y:0}; nextDir={x:1,y:0};
  score=0; stepInterval=200; shrinkElapsed=0; interpT=0;
  running=true; gameOver=false; particles=[];
  scoreEl.textContent=0; lengthEl.textContent=1; speedEl.textContent=1;
  startBtn.textContent='🔄 Hrát znovu'; startBtn.style.display='block';
  nameEntry.style.display='none';
  placeFood();
  const now=performance.now(); lastStepTime=now; lastTs=now;
  playStart();
  rafId=requestAnimationFrame(loop);
}

// ── Loop ───────────────────────────────────────────────────────────────────
function loop(ts) {
  const dt=ts-lastTs; lastTs=ts;
  const elapsed=ts-lastStepTime;
  shrinkElapsed+=dt;
  const shrinkLeft=Math.max(0,SHRINK_INTERVAL-shrinkElapsed);
  shrinkCountdown.textContent=Math.ceil(shrinkLeft/1000);
  shrinkBar.style.width=(shrinkLeft/SHRINK_INTERVAL*100)+'%';
  if(shrinkElapsed>=SHRINK_INTERVAL){
    shrinkElapsed-=SHRINK_INTERVAL;
    if(snake.length>1){ addParticles(snake[snake.length-1].x,snake[snake.length-1].y,'#3dff00',8); snake.pop(); snakePrev.pop(); playShrink(); }
  }
  interpT=Math.min(elapsed/stepInterval,1);
  if(elapsed>=stepInterval){
    lastStepTime=ts; interpT=0;
    snakePrev=snake.map(s=>({...s}));
    dir={x:nextDir.x,y:nextDir.y};
    const hx=(snake[0].x+dir.x+COLS)%COLS, hy=(snake[0].y+dir.y+ROWS)%ROWS;
    if(snake.some(s=>s.x===hx&&s.y===hy)){ end(); return; }
    snake.unshift({x:hx,y:hy});
    snakePrev.unshift({x:(hx-dir.x+COLS)%COLS,y:(hy-dir.y+ROWS)%ROWS});
    if(hx===food.x&&hy===food.y){
      const bonus=nextFoodIsBonus;
      score++; scoreEl.textContent=score;
      stepInterval=Math.max(80,200-Math.floor(score/5)*15);
      speedEl.textContent=Math.floor(score/5)+1;
      addParticles(food.x,food.y,bonus?'#ff4400':'#f5c542',bonus?24:12);
      if(bonus) addParticles(food.x,food.y,'#f5c542',12);
      playEat(bonus);
      if(bonus){ const tail=snake[snake.length-1]; snake.push({...tail}); snakePrev.push({...tail}); score++; scoreEl.textContent=score; }
      lengthEl.textContent=snake.length;
      placeFood();
    } else { snake.pop(); snakePrev.pop(); lengthEl.textContent=snake.length; }
  }
  draw();
  if(running) rafId=requestAnimationFrame(loop);
}

// ── Draw ───────────────────────────────────────────────────────────────────
function drawStars(){
  ctx.fillStyle='rgba(255,255,200,0.35)';
  for(let i=0;i<20;i++){
    ctx.beginPath();
    ctx.arc((i*137+50)%384,(i*97+30)%384,i%3===0?1.2:0.6,0,Math.PI*2);
    ctx.fill();
  }
}

function draw(){
  // stone background
  ctx.drawImage(stoneCanvas, 0, 0, canvas.width, canvas.height);
  drawStars();

  // subtle grid
  ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=0.5;
  for(let i=0;i<=COLS;i++){
    ctx.beginPath();ctx.moveTo(i*CELL,0);ctx.lineTo(i*CELL,canvas.height);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,i*CELL);ctx.lineTo(canvas.width,i*CELL);ctx.stroke();
  }

  // food
  if(food){
    const fx=food.x*CELL+CELL/2, fy=food.y*CELL+CELL/2;
    const pulse=1+(nextFoodIsBonus?0.3:0.18)*Math.sin(Date.now()/350);
    const r=Math.max(0.1,CELL/2*pulse-1);
    const grad=ctx.createRadialGradient(fx,fy,0,fx,fy,r+4);
    if(nextFoodIsBonus){
      // gold-red bonus
      grad.addColorStop(0,'#ffffff');
      grad.addColorStop(0.2,'#ffdd00');
      grad.addColorStop(0.6,'#ff6600');
      grad.addColorStop(1,'rgba(0,0,0,0)');
      ctx.shadowColor='#ffaa00'; ctx.shadowBlur=32;
    } else {
      // gold normal
      grad.addColorStop(0,'#fffacc');
      grad.addColorStop(0.35,'#f5c542');
      grad.addColorStop(0.75,'#c8960a');
      grad.addColorStop(1,'rgba(0,0,0,0)');
      ctx.shadowColor='#f5c542'; ctx.shadowBlur=16;
    }
    ctx.fillStyle=grad;
    ctx.beginPath(); ctx.arc(fx,fy,r,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
  }

  // snake – green gradient head to tail
  for(let i=snake.length-1;i>=0;i--){
    const cur=snake[i], prv=snakePrev[i]||cur;
    const ddx=cur.x-prv.x, ddy=cur.y-prv.y;
    const fromX=Math.abs(ddx)>1?cur.x-dir.x:prv.x;
    const fromY=Math.abs(ddy)>1?cur.y-dir.y:prv.y;
    const px=lerp(fromX,cur.x,interpT)*CELL, py=lerp(fromY,cur.y,interpT)*CELL;
    const ratio=1-i/Math.max(snake.length,1);
    // head: bright lime #7fff00, tail: dark green #1a4a00
    const rr=Math.round(lerp(20,100,ratio));
    const gg=Math.round(lerp(60,220,ratio));
    const bb=Math.round(lerp(0,10,ratio));
    ctx.fillStyle=i===0?'#7fff00':`rgba(${rr},${gg},${bb},${0.45+ratio*0.55})`;
    ctx.shadowColor=i===0?'#7fff00':'#3a8a00';
    ctx.shadowBlur=i===0?16:4;
    ctx.beginPath(); ctx.roundRect(px+1,py+1,CELL-2,CELL-2,5); ctx.fill();
  }
  ctx.shadowBlur=0;

  // particles
  particles=particles.filter(p=>p.life>0);
  for(const p of particles){
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.05; p.life-=0.035;
    const pr=Math.max(0.01,p.r*p.life);
    ctx.globalAlpha=p.life; ctx.fillStyle=p.color; ctx.shadowColor=p.color; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.arc(p.x,p.y,pr,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
  }
  ctx.globalAlpha=1;

  // overlays
  if(!running){
    ctx.fillStyle='rgba(0,0,0,0.85)'; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.textAlign='center';
    if(gameOver){
      ctx.shadowColor='#ff4400'; ctx.shadowBlur=24; ctx.fillStyle='#ff6600';
      ctx.font='bold 22px Georgia'; ctx.fillText('AVADA KEDAVRA!',canvas.width/2,canvas.height/2-30);
      ctx.shadowBlur=0; ctx.fillStyle='#f5c542'; ctx.font='16px Georgia';
      ctx.fillText('Skóre: '+score,canvas.width/2,canvas.height/2+2);
      ctx.fillStyle='#c8b87a'; ctx.font='13px Georgia';
      ctx.fillText('Zadej jméno a ulož skóre',canvas.width/2,canvas.height/2+28);
    } else {
      ctx.shadowColor='#7fff00'; ctx.shadowBlur=20; ctx.fillStyle='#7fff00';
      ctx.font='bold 18px Georgia'; ctx.fillText("🐍 NAGINI'S RUN 🐍",canvas.width/2,canvas.height/2-10);
      ctx.shadowBlur=0; ctx.fillStyle='#f5c542'; ctx.font='13px Georgia';
      ctx.fillText('Klikni na START pro začátek',canvas.width/2,canvas.height/2+18);
    }
  }
}

function end(){
  running=false; gameOver=true;
  startBtn.style.display='none';
  nameEntry.style.display='flex';
  nameInput.value=''; nameInput.focus();
  playDeath(); draw();
}

startBtn.addEventListener('click', init);
saveBtn.addEventListener('click', async () => {
  const name=(nameInput.value.trim()||'Hráč').slice(0,10);
  nameEntry.style.display='none';
  startBtn.style.display='block';
  await saveScore(name, score);
});
document.addEventListener('keydown',e=>{
  const map={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0}};
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  if(map[e.key]&&running){ const nd=map[e.key]; if(nd.x!==-dir.x||nd.y!==-dir.y) nextDir=nd; }
  if((e.key==='Enter'||e.key===' ')&&!running&&nameEntry.style.display==='none') init();
});

draw();
loadLeaderboard();
</script>
</body>
